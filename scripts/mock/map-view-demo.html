<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PIA Tracker — Map view (demo)</title>

  <!-- MapLibre GL JS (open source) -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    /* ── App theme tokens (approximate the Ant Design theme in the real app) ── */
    :root {
      --navy:#1e3a5f; --side:#1047ae; --side-sel:#2a63d6; --primary:#1565c0;
      --bg-layout:#f4f7fb; --bg-container:#ffffff; --border:#dbe3ee;
      --line-strong:#94a3b8; --tabbar:#eaf1fb;
      --text:#1f2937; --text-2:#64748b; --text-3:#94a3b8;
      --side-w:180px; --list-w:308px; --topbar-h:56px; --projbar-h:48px;
    }
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; font-family: system-ui, "Segoe UI", Roboto, sans-serif; color:var(--text); }
    #app { height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    /* ── TopBar ── */
    .topbar { height:var(--topbar-h); flex-shrink:0; background:var(--navy); color:#fff;
      display:flex; align-items:center; padding:0 18px; gap:12px; }
    .topbar .logo { width:30px; height:30px; border-radius:7px; background:#fff2;
      display:flex; align-items:center; justify-content:center; font-size:16px; }
    .topbar .title { font-weight:600; font-size:16px; letter-spacing:.2px; }
    .topbar .spacer { flex:1; }
    .topbar .user { display:flex; align-items:center; gap:9px; font-size:13px; }
    .topbar .avatar { width:30px; height:30px; border-radius:50%; background:#2a63d6;
      display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; }

    /* ── Project bar ── */
    .projbar { height:var(--projbar-h); flex-shrink:0; display:flex; align-items:center;
      background:var(--bg-container); border-bottom:2px solid var(--line-strong);
      box-shadow:0 2px 4px rgba(15,23,42,.06); }
    .projbar .back { width:var(--side-w); height:100%; flex-shrink:0; border:none;
      border-right:1px solid var(--border); background:#f4f7fb; cursor:pointer; font-size:12px;
      font-weight:600; color:var(--primary); display:flex; align-items:center; justify-content:center; gap:6px; }
    .projbar .pname { font-size:16px; font-weight:600; margin-left:16px; }
    .projbar .pmeta { font-size:12px; color:var(--text-2); margin-left:6px; }
    .projbar .spacer { flex:1; }
    .tag { font-size:13px; font-weight:600; padding:2px 14px; border-radius:20px; margin-right:16px; }
    .tag.active { background:#e6f4ea; color:#166534; }

    /* ── Body: nav sider + content ── */
    .body { flex:1; min-height:0; display:flex; }
    .sider { width:var(--side-w); flex-shrink:0; background:var(--side); padding:10px 0; }
    .navitem { display:flex; align-items:center; gap:10px; padding:11px 16px; font-size:13px;
      cursor:pointer; color:rgba(255,255,255,.85); border-left:3px solid transparent; }
    .navitem .ic { width:16px; text-align:center; }
    .navitem:hover { background:#ffffff14; }
    .navitem.active { color:#fff; font-weight:600; background:var(--side-sel); border-left:3px solid #fff; }

    /* ── Content area (this is the ant-layout-content / css-var-r0 region) ── */
    .content { flex:1; min-width:0; background:var(--bg-layout); display:flex; overflow:hidden; }

    /* Left: KMZ layers list */
    .layers-panel { width:var(--list-w); flex-shrink:0; background:var(--bg-container);
      border-right:1px solid var(--border); display:flex; flex-direction:column; }
    .lp-head { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
    .lp-head h3 { margin:0; font-size:14px; font-weight:600; }
    .lp-head .count { margin-left:auto; font-size:12px; color:var(--text-2);
      background:#eef3fb; border-radius:12px; padding:1px 9px; }
    .lp-list { flex:1; overflow:auto; padding:8px 8px 12px; }

    /* KMZ file (collapsed by default) */
    .kmz { margin-bottom:4px; border:1px solid transparent; border-radius:8px; }
    .kmz.on { border-color:var(--border); background:#f9fbff; }
    .kmz-row { display:flex; align-items:center; gap:8px; padding:7px 8px; border-radius:8px; cursor:default; }
    .kmz-row:hover { background:#f2f6fc; }
    .arrow { width:20px; text-align:center; color:var(--text-2); cursor:pointer; font-size:18px;
      line-height:1; user-select:none; transition:transform .12s; flex:0 0 auto; }
    .kmz.open .arrow { transform:rotate(90deg); }
    .kmz-row input { width:15px; height:15px; accent-color:var(--primary); cursor:pointer; flex:0 0 auto; }
    .kmz-row .fname { font-weight:600; font-size:13px; cursor:pointer; flex:1; min-width:0;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .dl { flex:0 0 auto; width:24px; height:24px; border:none; background:transparent; cursor:pointer;
      color:var(--text-3); font-size:15px; border-radius:5px; display:flex; align-items:center; justify-content:center; }
    .dl:hover { background:#e6eefb; color:var(--primary); }

    /* Feature-type tree (revealed on expand) */
    .kmz-tree { display:none; padding:2px 8px 8px 30px; }
    .kmz.open .kmz-tree { display:block; }
    .leaf { display:flex; align-items:center; gap:8px; padding:4px 4px; font-size:12.5px; cursor:pointer; }
    .leaf:hover { background:#f2f6fc; border-radius:6px; }
    .leaf input { width:14px; height:14px; accent-color:var(--primary); cursor:pointer; flex:0 0 auto; }
    .leaf .sw { width:12px; height:12px; border-radius:3px; flex:0 0 auto; }
    .leaf .lbl { color:var(--text); }
    .leaf .num { color:var(--text-3); }

    /* Right: map fills the rest of the content area */
    .map-wrap { flex:1; min-width:0; position:relative; }
    #map { position:absolute; inset:0; }
    .map-badge { position:absolute; top:12px; left:12px; z-index:2; background:#ffffffee;
      border:1px solid var(--border); border-radius:8px; padding:6px 12px; font-size:12px; font-weight:600;
      color:var(--navy); box-shadow:0 2px 8px rgba(15,23,42,.12); }
    .map-msg { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      text-align:center; color:var(--text-2); font-size:13px; padding:24px; }
    /* Map-side Fit button (HTML overlay — always visible when the map pane shows) */
    .fit-map-btn { position:absolute; top:12px; left:12px; z-index:3; cursor:pointer;
      background:var(--bg-container); border:1px solid var(--border); border-radius:8px;
      padding:7px 12px; font-size:13px; font-weight:600; color:var(--navy);
      box-shadow:0 2px 8px rgba(15,23,42,.16); }
    .fit-map-btn:hover { background:#eef5ff; border-color:var(--primary); color:var(--primary); }

    .maplibregl-popup-content { font-size:13px; max-height:260px; overflow:auto; border-radius:8px; }
    .maplibregl-popup-content b { color:var(--navy); }
    .maplibregl-popup-content table { border-collapse:collapse; margin-top:4px; }
    .maplibregl-popup-content td { border-bottom:1px solid #eee; padding:2px 8px; vertical-align:top; }
    .maplibregl-popup-content td:first-child { font-weight:600; color:#555; }
  </style>
</head>
<body>
  <div id="app">
    <!-- TopBar -->
    <div class="topbar">
      <div class="logo">🚆</div>
      <div class="title">PIA Tracker</div>
      <div class="spacer"></div>
      <div class="user"><span>S. B.</span><div class="avatar">SB</div></div>
    </div>

    <!-- Project bar -->
    <div class="projbar">
      <button class="back">← Back to Project list</button>
      <span class="pname">Jammu–Udhampur New Line</span>
      <span class="pmeta">· NEW_LINE · 53 km</span>
      <span class="spacer"></span>
      <span class="tag active">Active</span>
    </div>

    <!-- Body -->
    <div class="body">
      <!-- Nav sider -->
      <div class="sider">
        <div class="navitem"><span class="ic">▤</span>Overview</div>
        <div class="navitem"><span class="ic">📋</span>Records</div>
        <div class="navitem"><span class="ic">🕘</span>History</div>
        <div class="navitem active"><span class="ic">🗺️</span>Map</div>
      </div>

      <!-- Content area (ant-layout-content) -->
      <div class="content">
        <!-- KMZ layers list -->
        <div class="layers-panel">
          <div class="lp-head">
            <h3>Map layers</h3>
            <span class="count" id="count"></span>
          </div>
          <div class="lp-list" id="kmzList"></div>
        </div>

        <!-- Map -->
        <div class="map-wrap">
          <button class="fit-map-btn" id="fitBtn" title="Fit map to ticked layers">⤢ Fit to layers</button>
          <div id="map"></div>
        </div>
      </div>
    </div>
  </div>

    let map = null;
    const clickable = []; // layer ids that carry popups

    function initMap() {
      map = new maplibregl.Map({
        container:'map',
        style:{
          version:8,
          sources:{
            osm:{ type:'raster', tiles:['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
              tileSize:256, attribution:'© OpenStreetMap contributors' },
            orm:{ type:'raster', tiles:[
              'https://a.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png',
              'https://b.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png',
              'https://c.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png'],
              tileSize:256, attribution:'© OpenRailwayMap (CC-BY-SA)' }
          },
          layers:[
            { id:'osm', type:'raster', source:'osm' },
            { id:'orm', type:'raster', source:'orm', paint:{ 'raster-opacity':0.9 } }
          ]
        },
        center:[74.95,32.57], zoom:9
      });
      map.addControl(new maplibregl.NavigationControl(), 'top-right');
      map.addControl(new maplibregl.ScaleControl());

      map.on('load', () => {
        addNorthernBoundary();  // permanent reference layer — always on, not in the list
        KMZ_FILES.forEach(f => f.groups.forEach(g => addGroupLayer(f, g)));
        fitToTicked();
        map.on('click', clickHandler);
      });
    }

    // Northern boundary — a fixed reference line drawn on every project map.
    // Always visible (no toggle). Inlined (not fetched) so it renders even when
    // the demo is opened directly from disk (file://, where fetch is blocked).
    function addNorthernBoundary() {
      map.addSource('northern-boundary', { type:'geojson', data:NORTHERN_BOUNDARY });
      map.addLayer({ id:'nb-casing', type:'line', source:'northern-boundary',
        layout:{ 'line-join':'round', 'line-cap':'round' },
        paint:{ 'line-color':'#ffffff', 'line-width':5 } });
      map.addLayer({ id:'nb-line', type:'line', source:'northern-boundary',
        layout:{ 'line-join':'round', 'line-cap':'round' },
        paint:{ 'line-color':'#9ca3af', 'line-width':2.5 } });
    }

    // Add one geometry group as its own map layer(s), coloured per group.
    function addGroupLayer(f, g) {
      const src = `src-${f.id}-${g.geom}`;
      map.addSource(src, { type:'geojson', data:g.data });
      const vis = g.on ? 'visible' : 'none';
      g.layerIds = [];
      const add = (def) => { map.addLayer(def); g.layerIds.push(def.id); };

      if (g.geom === 'polygon') {
        add({ id:`${f.id}-${g.geom}-fill`, type:'fill', source:src,
          layout:{ visibility:vis }, paint:{ 'fill-color':g.color, 'fill-opacity':0.30 } });
        add({ id:`${f.id}-${g.geom}-line`, type:'line', source:src,
          layout:{ visibility:vis }, paint:{ 'line-color':g.color, 'line-width':2.5 } });
        clickable.push(`${f.id}-${g.geom}-fill`);
      } else if (g.geom === 'line') {
        // White casing under the line so it stays visible over the basemap
        // (matches the northern-boundary styling in the original index.html).
        add({ id:`${f.id}-${g.geom}-casing`, type:'line', source:src,
          layout:{ visibility:vis, 'line-join':'round', 'line-cap':'round' },
          paint:{ 'line-color':'#ffffff', 'line-width': f.id==='boundary'?6:8 } });
        add({ id:`${f.id}-${g.geom}-line`, type:'line', source:src,
          layout:{ visibility:vis, 'line-join':'round', 'line-cap':'round' },
          paint:{ 'line-color':g.color, 'line-width': f.id==='boundary'?3:5 } });
        clickable.push(`${f.id}-${g.geom}-line`);
      } else { // point
        add({ id:`${f.id}-${g.geom}-pt`, type:'circle', source:src,
          layout:{ visibility:vis },
          paint:{ 'circle-radius':6, 'circle-color':g.color, 'circle-stroke-width':1.5, 'circle-stroke-color':'#fff' } });
        add({ id:`${f.id}-${g.geom}-lbl`, type:'symbol', source:src,
          layout:{ visibility:vis, 'text-field':['get','name'], 'text-size':11, 'text-offset':[0,1.2], 'text-anchor':'top' },
          paint:{ 'text-color':'#1f2937', 'text-halo-color':'#fff', 'text-halo-width':1.4 } });
        clickable.push(`${f.id}-${g.geom}-pt`);
      }
    }

    // ── Left list: KMZ file → expandable feature-type tree ──
    function buildList() {
      const list = document.getElementById('kmzList');
      list.innerHTML = '';
      KMZ_FILES.forEach(f => {
        const item = document.createElement('div');
        item.className = 'kmz' + (anyOn(f) ? ' on' : '');

        // Row: arrow · checkbox · filename (no icon, no meta)
        const row = document.createElement('div');
        row.className = 'kmz-row';
        row.innerHTML =
          `<span class="arrow">▸</span>
           <input type="checkbox" class="kmz-cb">
           <span class="fname">${esc(f.name)}</span>
           <button class="dl" title="Download KMZ">
             <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <line x1="12" y1="3" x2="12" y2="14"/>
               <polyline points="7 9.5 12 14.5 17 9.5"/>
               <polyline points="5 15 5 20 19 20 19 15"/>
             </svg>
           </button>`;
        const arrow = row.querySelector('.arrow');
        const fname = row.querySelector('.fname');
        const cb = row.querySelector('input');
        const toggleOpen = () => item.classList.toggle('open');
        arrow.addEventListener('click', toggleOpen);
        fname.addEventListener('click', toggleOpen);
        cb.addEventListener('change', () => setFile(f, item, cb.checked));
        row.querySelector('.dl').addEventListener('click', (e) => { e.stopPropagation(); downloadKmz(f); });

        // Tree: one leaf per geometry group — swatch colour + "Label (n)"
        const tree = document.createElement('div');
        tree.className = 'kmz-tree';
        f.groups.forEach(g => {
          const leaf = document.createElement('label');
          leaf.className = 'leaf';
          leaf.innerHTML =
            `<input type="checkbox" ${g.on?'checked':''}>
             <span class="sw" style="background:${g.color}"></span>
             <span class="lbl">${g.label} <span class="num">(${g.data.features.length})</span></span>`;
          leaf.querySelector('input').addEventListener('change', e => {
            g.on = e.target.checked;
            setGroupVis(g);
            item.classList.toggle('on', anyOn(f));
            syncFileCheckbox(f, cb);
            updateCount();
          });
          tree.appendChild(leaf);
        });

        item.appendChild(row);
        item.appendChild(tree);
        list.appendChild(item);
        syncFileCheckbox(f, cb);
      });
      updateCount();
    }

    // File-level checkbox toggles all its groups.
    function setFile(f, item, on) {
      f.groups.forEach(g => { g.on = on; setGroupVis(g); });
      item.querySelectorAll('.leaf input').forEach((el, i) => { el.checked = f.groups[i].on; el.indeterminate = false; });
      item.classList.toggle('on', anyOn(f));
      updateCount();
    }
    function setGroupVis(g) {
      const vis = g.on ? 'visible' : 'none';
      (g.layerIds || []).forEach(id => map && map.getLayer(id) && map.setLayoutProperty(id, 'visibility', vis));
    }
    // File checkbox = checked if all groups on, indeterminate if some.
    function syncFileCheckbox(f, cb) {
      const on = f.groups.filter(g => g.on).length;
      cb.checked = on === f.groups.length;
      cb.indeterminate = on > 0 && on < f.groups.length;
    }
    const anyOn = (f) => f.groups.some(g => g.on);

    function updateCount() {
      const shown = KMZ_FILES.filter(anyOn).length;
      document.getElementById('count').textContent = `${shown}/${KMZ_FILES.length} shown`;
    }

    // Fit the map to every ticked group's extent.
    function fitToTicked() {
      if (!map) return;
      const b = new maplibregl.LngLatBounds();
      const walk = c => { if (typeof c[0]==='number') b.extend(c); else c.forEach(walk); };
      KMZ_FILES.forEach(f => f.groups.forEach(g => {
        if (g.on && g.data.features) g.data.features.forEach(ft => ft.geometry?.coordinates && walk(ft.geometry.coordinates));
      }));
      if (!b.isEmpty()) map.fitBounds(b, { padding:70, maxZoom:13, duration:700 });
    }

    // Popups on click.
    function clickHandler(e) {
      const feats = map.queryRenderedFeatures(e.point, { layers: clickable.filter(id => map.getLayer(id)) });
      if (!feats.length) return;
      const p = feats[0].properties || {};
      const rows = Object.keys(p).filter(k => p[k]!=='' && p[k]!=null && k!=='name')
        .map(k => `<tr><td>${esc(k)}</td><td>${esc(String(p[k]))}</td></tr>`).join('');
      new maplibregl.Popup({ maxWidth:'300px' }).setLngLat(e.lngLat)
        .setHTML((p.name?`<b>${esc(p.name)}</b>`:'') + (rows?`<table>${rows}</table>`:'')).addTo(map);
    }

    // Download the KMZ. (Demo: exports the file's features as GeoJSON; the real
    // app streams the actual stored .kmz from the backend.)
    function downloadKmz(f) {
      const features = f.groups.flatMap(g => g.data.features);
      const blob = new Blob([JSON.stringify(fc(features), null, 2)], { type:'application/geo+json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = f.name.replace(/\.kmz$/i, '') + '.geojson';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(a.href);
    }

    function esc(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    /* ── Boot (runs LAST, after every declaration — avoids the const TDZ error) ── */
    buildList();
    document.getElementById('fitBtn').addEventListener('click', fitToTicked);
    if (typeof maplibregl !== 'undefined') {
      initMap();
    } else {
      document.getElementById('map').insertAdjacentHTML('beforebegin',
        '<div class="map-msg">Map library couldn’t load (offline?).<br>The layer list on the left still works.</div>');
    }
  </script>
