global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: pia-tracker

scrape_configs:
  - job_name: pia-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: backend
          component: api

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Optional: scrape nginx via the stub_status module (Phase 2 adds the module)
  # - job_name: nginx
  #   static_configs:
  #     - targets: ['nginx:80']

# Alert rules land in Phase 2 — see docs/deployment.md § 7 (alerting).
# rule_files:
#   - /etc/prometheus/rules/*.yml
