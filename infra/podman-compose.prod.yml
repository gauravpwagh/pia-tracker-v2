# PIA Tracker — production podman-compose for air-gapped RHEL 9 server.
#
# IMPORTANT: Podman port-forwarding is broken on this RHEL 9 host.
# System nginx reaches containers via static bridge IPs (10.90.0.x) directly.
# Do NOT add `ports:` mappings — they will not work reliably.
#
# All images are pre-loaded via `podman load` — pull_policy: never on every
# service prevents Podman from attempting registry pulls on an air-gapped host.
#
# Network subnet: 10.90.0.0/24  (CRS uses 10.89.0.0/24 — no overlap)
# Static IPs:
#   10.90.0.2  pia-postgres
#   10.90.0.3  pia-backend
#   10.90.0.4  pia-minio
#   10.90.0.5  pia-clamav
#   10.90.0.6  pia-prometheus
#   10.90.0.7  pia-grafana
#   10.90.0.8  pia-loki
#
# System nginx proxy targets:
#   /pia/api/   → http://10.90.0.3:8080/api/
#   /pia/minio/ → http://10.90.0.4:9000/

name: pia

services:

  backend:
    image: localhost/pia-backend:prod
    pull_policy: never
    container_name: pia-backend
    restart: unless-stopped
    networks:
      pia:
        ipv4_address: 10.90.0.3
    environment:
      PIA_PROFILE: prod
      PIA_AUTH_MODE: dummy
      POSTGRES_HOST: 10.90.0.2
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-pia}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-pia_app}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
      POSTGRES_MIGRATOR_USER: ${POSTGRES_MIGRATOR_USER:-pia_migrator}
      POSTGRES_MIGRATOR_PASSWORD: ${POSTGRES_MIGRATOR_PASSWORD}
      MINIO_ENDPOINT: http://10.90.0.4:9000
      MINIO_PUBLIC_ENDPOINT: http://10.77.48.80/pia/minio
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      CLAMAV_HOST: 10.90.0.5
      CLAMAV_PORT: 3310
      TZ: Asia/Kolkata
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s

  postgres:
    image: docker.io/library/postgres:16-alpine
    pull_policy: never
    container_name: pia-postgres
    restart: unless-stopped
    networks:
      pia:
        ipv4_address: 10.90.0.2
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pia}
      POSTGRES_USER: ${POSTGRES_USER:-pia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Kolkata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:z
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-pia}", "-d", "${POSTGRES_DB:-pia}"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    pull_policy: never
    container_name: pia-minio
    restart: unless-stopped
    networks:
      pia:
        ipv4_address: 10.90.0.4
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio-init:
    image: quay.io/minio/mc:latest
    pull_policy: never
    container_name: pia-minio-init
    networks:
      pia:
        ipv4_address: 10.90.0.9
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        mc alias set local http://10.90.0.4:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/${MINIO_BUCKET_ATTACHMENTS:-pia-attachments} &&
        mc mb --ignore-existing local/${MINIO_BUCKET_QUARANTINE:-pia-quarantine} &&
        echo "Buckets ready."

  clamav:
    image: docker.io/clamav/clamav:1.4
    pull_policy: never
    container_name: pia-clamav
    restart: unless-stopped
    networks:
      pia:
        ipv4_address: 10.90.0.5
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc -w 5 localhost 3310 | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  prometheus:
    image: docker.io/prom/prometheus:latest
    pull_policy: never
    container_name: pia-prometheus
    restart: unless-stopped
    networks:
      pia:
        ipv4_address: 10.90.0.6
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:z
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d

  grafana:
    image: docker.io/grafana/grafana-oss:latest
    pull_policy: never
    container_name: pia-grafana
    restart: unless-stopped
    networks:
      pia:
        ipv4_address: 10.90.0.7
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: http://10.77.48.80/pia/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:z
      - ./grafana/dashboards:/var/lib/grafana/dashboards:z
    depends_on: [prometheus, loki]

  loki:
    image: docker.io/grafana/loki:latest
    pull_policy: never
    container_name: pia-loki
    restart: unless-stopped
    networks:
      pia:
        ipv4_address: 10.90.0.8
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

volumes:
  postgres_data:
  minio_data:
  clamav_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  pia:
    driver: bridge
    ipam:
      config:
        - subnet: 10.90.0.0/24
