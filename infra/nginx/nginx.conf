user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging: JSON-ish format so Loki/promtail can index fields
    log_format json_combined escape=json
        '{'
            '"ts":"$time_iso8601",'
            '"remote":"$remote_addr",'
            '"user":"$remote_user",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"size":$body_bytes_sent,'
            '"referer":"$http_referer",'
            '"ua":"$http_user_agent",'
            '"rt":$request_time,'
            '"upstream_rt":"$upstream_response_time",'
            '"trace_id":"$http_x_trace_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Request body limits — see docs/security.md § 1 (DoS)
    client_max_body_size 100M;
    client_body_timeout 60s;
    client_header_timeout 10s;
    send_timeout 60s;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # Upstreams
    upstream pia_backend {
        server backend:8080;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
