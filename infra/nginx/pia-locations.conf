# ── PIA Tracker locations — add inside the existing `server { listen 80 ... }` block in crs.conf ──

    # PIA Backend API — strip /pia prefix before forwarding to Spring Boot
    location /pia/api/ {
        proxy_pass         http://10.90.0.3:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 500M;
    }

    # PIA MinIO presigned URL proxy — strip /pia prefix
    location /pia/minio/ {
        proxy_pass         http://10.90.0.4:9000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        client_max_body_size 500M;
    }

    # PIA Grafana (optional — internal monitoring)
    location /pia/grafana/ {
        proxy_pass         http://10.90.0.7:3000/pia/grafana/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # PIA SPA static files — must be last (most general match)
    location /pia/ {
        alias /usr/share/nginx/html/pia/;
        try_files $uri $uri/ /pia/index.html;
    }
