# PIA Tracker — main vhost.
# Serves the SPA, reverse-proxies /api and /actuator to the backend,
# applies CSP and other security headers per docs/security.md § 2.

# HTTP -> HTTPS redirect
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Liveness probe path bypasses the redirect
    location /healthz {
        access_log off;
        return 200 'ok\n';
        add_header Content-Type text/plain;
    }

    return 301 https://$host$request_uri;
}

# HTTPS — main app
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pia.local;

    ssl_certificate     /etc/nginx/certs/pia.local-cert.pem;
    ssl_certificate_key /etc/nginx/certs/pia.local-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    # Security headers — see docs/security.md § 2
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP must be a single line — Node.js HTTP/1.1 parser rejects multi-line header values.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Trace ID — generate if not provided, surface in logs and to upstream
    set $trace_id $http_x_trace_id;
    if ($trace_id = '') {
        set $trace_id $request_id;
    }

    # Static SPA
    root /usr/share/nginx/html;
    index index.html;

    location /healthz {
        access_log off;
        return 200 'ok\n';
        add_header Content-Type text/plain;
    }

    # Use a variable so nginx re-resolves via Docker DNS (127.0.0.11) on each
    # request TTL expiry instead of caching the IP at startup.  This means
    # restarting the backend container never causes a 502 here.
    set $backend http://backend:8080;
    set $minio   http://minio:9000;
    set $grafana http://grafana:3000;

    # MinIO S3 API — browser PUTs presigned URLs directly here.
    # The Host header is kept as minio:9000 so MinIO's HMAC signature
    # verification passes (the URL was signed against that host).
    # proxy_request_buffering off streams large uploads without landing on disk.
    location /minio/ {
        rewrite ^/minio/(.*)$ /$1 break;
        proxy_pass              $minio;
        proxy_http_version      1.1;
        proxy_set_header        Host              minio:9000;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_request_buffering off;
        proxy_buffering         off;
        client_max_body_size    0;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
        # Expose ETag so the browser upload engine can read it for multipart assembly
        add_header Access-Control-Expose-Headers "ETag" always;
    }

    # API + actuator -> backend
    location /api/ {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Trace-Id        $trace_id;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_buffering off;
    }

    location /actuator/ {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Trace-Id        $trace_id;
    }

    # Grafana (app/security logs) — Admin/SuperAdmin only, linked from the sidebar.
    # Grafana has its own separate login; PIA does not proxy its auth.
    location /grafana/ {
        proxy_pass         $grafana;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Grafana Live uses WebSockets
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # add_header inheritance is all-or-nothing per location — re-declare the
        # headers we still want, but drop the SPA's strict CSP (script-src 'self'
        # etc. would break Grafana's own inline scripts/styles).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Static asset caching
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every other path returns index.html so client-side routes resolve
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
