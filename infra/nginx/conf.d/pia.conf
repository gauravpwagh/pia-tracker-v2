# PIA Tracker — main vhost.
# Serves the SPA, reverse-proxies /api and /actuator to the backend,
# applies CSP and other security headers per docs/security.md § 2.

# HTTP -> HTTPS redirect
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Liveness probe path bypasses the redirect
    location /healthz {
        access_log off;
        return 200 'ok\n';
        add_header Content-Type text/plain;
    }

    return 301 https://$host$request_uri;
}

# HTTPS — main app
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pia.local;

    ssl_certificate     /etc/nginx/certs/pia.local-cert.pem;
    ssl_certificate_key /etc/nginx/certs/pia.local-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    # Security headers — see docs/security.md § 2
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP must be a single line — Node.js HTTP/1.1 parser rejects multi-line header values.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Trace ID — generate if not provided, surface in logs and to upstream
    set $trace_id $http_x_trace_id;
    if ($trace_id = '') {
        set $trace_id $request_id;
    }

    # Static SPA
    root /usr/share/nginx/html;
    index index.html;

    location /healthz {
        access_log off;
        return 200 'ok\n';
        add_header Content-Type text/plain;
    }

    # API + actuator -> backend
    location /api/ {
        proxy_pass         http://pia_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Trace-Id        $trace_id;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_request_buffering off;
        # No caching for API responses
        proxy_cache off;
        proxy_buffering off;
    }

    location /actuator/ {
        proxy_pass         http://pia_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Trace-Id        $trace_id;
        # Restrict actuator access in production via allow/deny (Phase 3); permissive in v1
    }

    # Static asset caching
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every other path returns index.html so client-side routes resolve
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
