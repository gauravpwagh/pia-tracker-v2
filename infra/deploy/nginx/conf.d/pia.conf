# PIA Tracker — server blocks (self-contained; PIA owns this nginx).
#
# Podman's DNS is the network GATEWAY (10.90.0.1), NOT Docker's 127.0.0.11.
# Because we proxy_pass to a VARIABLE (container name resolved at request time),
# nginx REQUIRES this resolver or every proxied request 502s (gotcha #4).
resolver 10.90.0.1 valid=10s ipv6=off;

# ── HTTP (host ${PIA_HTTP_PORT} → 80). No forced HTTPS redirect: a middleman may
#    forward plain HTTP to us (gotcha #6). Serves the app directly over HTTP. ──
server {
    listen 80 default_server;
    server_name _;

    include /etc/nginx/conf.d/pia.locations.inc;
}

# ── HTTPS (host ${PIA_HTTPS_PORT} → 443). Certs from /opt/pia/shared/certs.
#    setup.sh generates a self-signed pair if none are provided. ──
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/pia.crt;
    ssl_certificate_key /etc/nginx/certs/pia.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    include /etc/nginx/conf.d/pia.locations.inc;
}
