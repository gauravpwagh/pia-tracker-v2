# PIA Tracker — base Spring Boot configuration.
# Profile overrides in application-{dev,beta,prod}.yml.

spring:
  application:
    name: pia-tracker
  profiles:
    active: ${PIA_PROFILE:dev}
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
    deserialization:
      FAIL_ON_UNKNOWN_PROPERTIES: false
    default-property-inclusion: non_null
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:pia}
    username: ${POSTGRES_APP_USER:pia_app}
    password: ${POSTGRES_APP_PASSWORD:pia_app}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 60000
      connection-timeout: 5000
      leak-detection-threshold: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
        order_updates: true
        format_sql: false
        generate_statistics: false
    open-in-view: false
  flyway:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:pia}
    user: ${POSTGRES_MIGRATOR_USER:pia_migrator}
    password: ${POSTGRES_MIGRATOR_PASSWORD:pia_migrator}
    locations: classpath:db/migration,classpath:db/data
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
  servlet:
    multipart:
      enabled: false
  mvc:
    problemdetails:
      enabled: true

server:
  port: 8080
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain,text/html
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /api/v1/openapi.json
  swagger-ui:
    path: /api/v1/swagger-ui
    operations-sorter: alpha
    tags-sorter: alpha

pia:
  auth:
    mode: ${PIA_AUTH_MODE:dummy}
  base-url: ${PIA_BASE_URL:https://pia.local}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:}
    access-key: ${MINIO_ROOT_USER:miniopia}
    secret-key: ${MINIO_ROOT_PASSWORD:change-me}
    bucket-attachments: ${MINIO_BUCKET_ATTACHMENTS:pia-attachments}
    bucket-quarantine: ${MINIO_BUCKET_QUARANTINE:pia-quarantine}
  clamav:
    host: ${CLAMAV_HOST:clamav}
    port: ${CLAMAV_PORT:3310}
    timeout-ms: 30000
  attachments:
    max-bytes: 10737418240        # 10 GB hard ceiling
    multipart-threshold-bytes: 104857600   # files > 100 MB use multipart
    multipart-part-size-bytes: 104857600   # 100 MB per part
    presign-expiry-minutes: 60
    scan-exempt-above-bytes: 2147483648    # 2 GB → skip ClamAV (drone video)
  rate-limits:
    default-per-minute: 600
    auth-per-minute: 5
    action-per-minute: 30
    export-per-hour: 3

logging:
  level:
    root: INFO
    in.gov.ir.pia: ${PIA_LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN
    org.springframework.security: INFO
  pattern:
    console: '{"ts":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%-5level","logger":"%logger{36}","trace":"%X{traceId:-}","user":"%X{userId:-anonymous}","msg":"%enc{%msg}{JSON}","ex":"%enc{%ex}{JSON}"}%n'
