build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true

comments:
  active: true
  AbsentOrWrongFileLicense:
    active: false
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 20
  LongMethod:
    active: true
    threshold: 80
    # Integration tests and golden-path E2E tests are inherently long; excluding
    # them keeps the rule meaningful for production code.
    excludes: ['**/test/**', '**/*Test.kt', '**/*Spec.kt', '**/*IntegrationTest.kt']
  LongParameterList:
    active: true
    functionThreshold: 8
    # JPA entity constructors must list every column as a constructor parameter.
    # Spring service constructors grow with every new dependency injection.
    # Project entity has 20 columns; raising to 22 gives a single column of
    # headroom before the rule becomes meaningful again.
    constructorThreshold: 22
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 20
    thresholdInInterfaces: 20
    thresholdInObjects: 20
    thresholdInEnums: 20

coroutines:
  active: true

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: '_|(ignore|expected).*'

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - ArrayIndexOutOfBoundsException
      - Error
      - Exception
      - IllegalMonitorStateException
      - NullPointerException
      - RuntimeException
      - Throwable

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
    excludes: ['**/test/**', '**/*Test.kt', '**/*Spec.kt']
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[a-z][A-Za-z0-9]*'
    privatePropertyPattern: '_?[a-z][A-Za-z0-9]*'

performance:
  active: true
  SpreadOperator:
    active: false

potential-bugs:
  active: true
  UnsafeCallOnNullableType:
    active: true

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2', '24', '100', '500', '1000']
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: true
    ignoreAnnotation: true
    ignoreNamedArgument: true
    ignoreEnums: true
    ignoreRanges: true
    ignoreExtensionFunctions: true
  MaxLineLength:
    active: true
    maxLineLength: 140
    # Test backtick function names and long assertion strings routinely exceed
    # 140 chars and cannot be meaningfully shortened. Excluding test files keeps
    # the rule enforced for production code.
    excludes: ['**/test/**', '**/*Test.kt', '**/*Spec.kt', '**/*IntegrationTest.kt']
  ReturnCount:
    active: true
    # PermissionEvaluator has multiple early-return paths by design (one per
    # permission code branch). 6 covers the current evaluator without needing
    # per-site suppression.
    max: 6
  ThrowsCount:
    active: true
    # Service validation methods (permission check → 403, missing entity → 404,
    # stale ETag → 409) naturally reach 3 throw sites. Raising to 3 keeps the
    # rule meaningful without suppressing every service method.
    max: 3
  UseCheckOrError:
    # We prefer explicit `throw IllegalStateException(...)` for clarity over the
    # check()/error() shorthands. Disable this style-only rule.
    active: false
  WildcardImport:
    active: true
    excludeImports:
      - 'java.util.*'
      - 'kotlinx.coroutines.*'
